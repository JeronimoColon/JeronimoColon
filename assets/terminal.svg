<svg xmlns="http://www.w3.org/2000/svg" width="840" height="656" viewBox="0 0 840 656" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" role="img" aria-label="Terminal session introducing Jeronimo Colon III">
  <defs>
    <clipPath id="window"><rect width="840" height="656" rx="10"/></clipPath>
  </defs>
  <g clip-path="url(#window)">
    <rect width="840" height="656" fill="#0c0f14"/>
    <rect width="840" height="36" fill="#161b22"/>
    <rect y="35" width="840" height="1" fill="#21262d"/>
  </g>
  <circle cx="24" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="44" cy="18" r="6" fill="#febc2e"/>
  <circle cx="64" cy="18" r="6" fill="#28c840"/>
  <text x="420" y="22.5" text-anchor="middle" font-size="12" fill="#768390">jeronimo@nyc - zsh</text>
  <text x="24" y="74" xml:space="preserve"><tspan fill="#2dd4bf">$ </tspan><tspan fill="#e6edf3">whoami</tspan></text>
  <text x="24" y="96" xml:space="preserve"><tspan fill="#e6edf3">Jeronimo Colon III</tspan><tspan fill="#adbac7"> - engineering leader, hacking on fun projects. NYC.</tspan></text>
  <text x="24" y="140" xml:space="preserve"><tspan fill="#2dd4bf">$ </tspan><tspan fill="#e6edf3">cat about.txt</tspan></text>
  <text x="24" y="162" xml:space="preserve"><tspan fill="#adbac7">15 years growing &amp; leading high-performing teams: financial services,</tspan></text>
  <text x="24" y="184" xml:space="preserve"><tspan fill="#adbac7">civic tech, B2C &amp; B2B SaaS products, high-traffic travel.</tspan></text>
  <text x="24" y="206" xml:space="preserve"><tspan fill="#adbac7">From bio to tech - always thinking in systems.</tspan></text>
  <text x="24" y="250" xml:space="preserve"><tspan fill="#2dd4bf">$ </tspan><tspan fill="#e6edf3">ls ~/building</tspan></text>
  <text x="24" y="272" xml:space="preserve"><tspan fill="#4493f8">tidesman/</tspan><tspan fill="#adbac7">        a free native MCP server for Apple's container tool</tspan></text>
  <text x="24" y="294" xml:space="preserve"><tspan fill="#4493f8">aws-ses-relay/</tspan><tspan fill="#adbac7">   Rust Lambda that gates and forwards inbound SES mail</tspan></text>
  <text x="24" y="338" xml:space="preserve"><tspan fill="#2dd4bf">$ </tspan><tspan fill="#e6edf3">printenv STACK</tspan></text>
  <text x="24" y="360" xml:space="preserve"><tspan fill="#adbac7">Rust:TypeScript:Python:Swift:AWS</tspan></text>
  <text x="24" y="404" xml:space="preserve"><tspan fill="#2dd4bf">$ </tspan><tspan fill="#e6edf3">cat sites.txt</tspan></text>
  <text x="24" y="426" xml:space="preserve"><tspan fill="#4493f8">jeronimocolon.com</tspan><tspan fill="#adbac7">   portfolio, résumé, and the workshop</tspan></text>
  <text x="24" y="448" xml:space="preserve"><tspan fill="#4493f8">tidesman.dev</tspan><tspan fill="#adbac7">        Tidesman docs and install</tspan></text>
  <text x="24" y="470" xml:space="preserve"><tspan fill="#4493f8">listmy.info</tspan><tspan fill="#adbac7">         what your browser tells the world about you - no tracking</tspan></text>
  <text x="24" y="514" xml:space="preserve"><tspan fill="#2dd4bf">$ </tspan><tspan fill="#e6edf3">tail -n 3 CHANGELOG</tspan></text>
  <text x="24" y="536" xml:space="preserve"><tspan fill="#adbac7">2026-07-16  Tidesman v0.2.0</tspan></text>
  <text x="24" y="558" xml:space="preserve"><tspan fill="#adbac7">2026-07-13  aws-ses-relay v0.1.1</tspan></text>
  <text x="24" y="580" xml:space="preserve"><tspan fill="#adbac7">2026-07-06  aws-ses-relay v0.1.0</tspan></text>
  <text x="24" y="624" xml:space="preserve"><tspan fill="#2dd4bf">$ </tspan></text>
  <rect x="41" y="611" width="8" height="16" fill="#2dd4bf"><animate attributeName="opacity" values="1;0" calcMode="discrete" dur="1.2s" repeatCount="indefinite"/></rect>
  <rect x="0.5" y="0.5" width="839" height="655" rx="10" fill="none" stroke="#21262d"/>
</svg>
